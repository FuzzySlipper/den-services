version: "2"

run:
  timeout: 5m
  tests: true

linters:
  enable:
    - bodyclose
    - contextcheck
    - errorlint
    - forbidigo
    - gochecknoglobals
    - gochecknoinits
    - govet
    - sqlclosecheck

  settings:
    forbidigo:
      forbid:
        - pattern: \binit\s*\(
          msg: init functions are forbidden; wire dependencies explicitly.
        - pattern: \bpanic\s*\(
          msg: panic is forbidden outside initialization entry points.
        - pattern: \blog\.Fatal(f|ln)?\s*\(
          msg: log.Fatal is only allowed in cmd main wiring.
        - pattern: (?i)select\s+\*
          msg: SQL queries must specify explicit column lists.

  exclusions:
    rules:
      - path: _test\.go
        linters:
          - gochecknoglobals
      - path: /cmd/
        linters:
          - forbidigo
        text: log.Fatal

formatters:
  enable:
    - gofumpt
    - goimports
  settings:
    gofumpt:
      module-path: den-services
    goimports:
      local-prefixes:
        - den-services
