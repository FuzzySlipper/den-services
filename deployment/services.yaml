# Deployable den-services Go services.
# This registry is intentionally small and operational: deploy scripts and tests
# use it to keep service names, primary binaries, health, and version contracts
# aligned.

services:
  - name: "gateway"
    module: "gateway"
    binary_name: "gateway"
    binary_path: "./gateway/cmd/proxy"
    config_example: "gateway/config/config.example.yaml"
    env_example: "gateway/config/gateway.env.example"
    health_url: "http://127.0.0.1:8079/health"
    version_url: "http://127.0.0.1:8079/version"
    systemd_unit: "den-go@gateway.service"

  - name: "runtime"
