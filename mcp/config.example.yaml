# Local development configuration for the den-services MCP facade shell.
# This intentionally binds a non-production loopback port. The eventual live
# promotion to 192.168.1.10:5199 is a separate cutover task.

server:
  listen_addr: "127.0.0.1:8090"
  mcp_endpoint_path: "/mcp"
  read_header_timeout: "5s"

security:
  service_token_env: "DEN_MCP_SERVICE_TOKEN"
  allow_unauthenticated_local_dev: true

routes:
  table_path: "routes.example.yaml"

backends:
  - name: "den-core"
    base_url: "http://127.0.0.1:5299"
    health_path: "/health"
    timeout: "3s"
    service_token_env: "DEN_CORE_SERVICE_TOKEN"
  - name: "projects"
    base_url: "http://127.0.0.1:8091"
    health_path: "/health"
    timeout: "3s"
    service_token_env: "DEN_PROJECTS_SERVICE_TOKEN"
  - name: "tasks"
    base_url: "http://127.0.0.1:8092"
    health_path: "/health"
    timeout: "3s"
    service_token_env: "DEN_TASKS_SERVICE_TOKEN"
  - name: "messages"
    base_url: "http://127.0.0.1:8093"
    health_path: "/health"
    timeout: "3s"
    service_token_env: "DEN_MESSAGES_SERVICE_TOKEN"
  - name: "documents"
    base_url: "http://127.0.0.1:8094"
    health_path: "/health"
    timeout: "3s"
    service_token_env: "DEN_DOCUMENTS_SERVICE_TOKEN"
  - name: "review"
    base_url: "http://127.0.0.1:8096"
    health_path: "/health"
    timeout: "3s"
    service_token_env: "DEN_REVIEW_SERVICE_TOKEN"
  - name: "knowledge"
    base_url: "http://127.0.0.1:8095"
    health_path: "/health"
    timeout: "3s"
    service_token_env: "DEN_KNOWLEDGE_SERVICE_TOKEN"
  - name: "guidance"
    base_url: "http://127.0.0.1:8097"
    health_path: "/health"
    timeout: "3s"
    service_token_env: "DEN_GUIDANCE_SERVICE_TOKEN"
  - name: "librarian"
    base_url: "http://127.0.0.1:8098"
    health_path: "/health"
    timeout: "3s"
    service_token_env: "DEN_LIBRARIAN_SERVICE_TOKEN"
