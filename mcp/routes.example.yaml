# Static route table for the initial den-core compatibility backend.
# Route reload is explicit through the backend locator's ReloadRoutes method;
# the first service wiring loads this file at startup and requires restart/SIGHUP
# wiring in a later deployment task to invoke reload operationally.

routes:
  - operation: "get_project"
    backend: "den-core"
    method: "POST"
    path: "/mcp"
    request_adapter: "mcp_tools_call"
    response_adapter: "mcp_jsonrpc_result"
  - operation: "list_tasks"
    backend: "den-core"
    method: "POST"
    path: "/mcp"
    request_adapter: "mcp_tools_call"
    response_adapter: "mcp_jsonrpc_result"
  - operation: "get_task"
    backend: "den-core"
    method: "POST"
    path: "/mcp"
    request_adapter: "mcp_tools_call"
    response_adapter: "mcp_jsonrpc_result"
  - operation: "create_task"
    backend: "den-core"
    method: "POST"
    path: "/mcp"
    request_adapter: "mcp_tools_call"
    response_adapter: "mcp_jsonrpc_result"
  - operation: "update_task"
    backend: "den-core"
    method: "POST"
    path: "/mcp"
    request_adapter: "mcp_tools_call"
    response_adapter: "mcp_jsonrpc_result"
  - operation: "send_message"
    backend: "den-core"
    method: "POST"
    path: "/mcp"
    request_adapter: "mcp_tools_call"
    response_adapter: "mcp_jsonrpc_result"
  - operation: "get_messages"
    backend: "den-core"
    method: "POST"
    path: "/mcp"
    request_adapter: "mcp_tools_call"
    response_adapter: "mcp_jsonrpc_result"
  - operation: "get_document"
    backend: "den-core"
    method: "POST"
    path: "/mcp"
    request_adapter: "mcp_tools_call"
    response_adapter: "mcp_jsonrpc_result"
  - operation: "store_document"
    backend: "den-core"
    method: "POST"
    path: "/mcp"
    request_adapter: "mcp_tools_call"
    response_adapter: "mcp_jsonrpc_result"
