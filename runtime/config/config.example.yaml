# Runtime module configuration.
# Copy to config.yaml and customize for the deployment.

bind_addr: "127.0.0.1:8081"
database_url: "${DEN_RUNTIME_DATABASE_URL}"

heartbeat:
  interval: "30s"
  stale_threshold: "90s"
  dead_threshold: "300s"
  sweep_interval: "30s"

http:
  read_header_timeout: "5s"
