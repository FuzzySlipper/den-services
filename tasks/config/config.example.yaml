# Tasks service configuration.
# Copy to /data/services/tasks/config/config.yaml for deployment.

bind_addr: "127.0.0.1:8092" # Loopback HTTP listen address.
database_url_env: "DEN_TASKS_DATABASE_URL" # Env var containing the Postgres URL.
service_token_env: "DEN_TASKS_SERVICE_TOKEN" # Env var containing the bearer token.
projects_base_url_env: "DEN_PROJECTS_BASE_URL" # Optional projects service base URL for assert-writable.
projects_token_env: "DEN_PROJECTS_SERVICE_TOKEN" # Optional projects service bearer token.

http:
  read_header_timeout: "5s" # Maximum time to read request headers.
