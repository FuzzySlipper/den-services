# Visual Contract module configuration.
# Copy to /data/services/visual-contract/config/config.yaml for deployment.

bind_addr: "127.0.0.1:8086" # Loopback HTTP listen address.

artifacts:
  base_url: "http://127.0.0.1:8086/visual-contracts" # Public base URL used in artifact refs.
  path: "/data/services/visual-contract/data/artifacts" # Local artifact storage directory.

http:
  read_header_timeout: "5s" # Maximum time to read request headers.
